<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Shredder Pro ✂️</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <header class="w-full flex justify-between items-center p-4 bg-gray-800 shadow-md">
        <div onclick="toggleMenu('pdfMenu')" class="cursor-pointer text-2xl">☰</div>
        <h1 class="font-bold text-xl text-red-500">PDF SHREDDER</h1>
        <div onclick="toggleMenu('settingsMenu')" class="cursor-pointer text-2xl">⠿</div>
    </header>

    <div id="pdfMenu" class="fixed left-0 top-0 h-full w-72 bg-gray-900 p-6 shadow-2xl hidden z-50 overflow-y-auto border-r border-gray-700">
        <button onclick="toggleMenu('pdfMenu')" class="mb-6 font-bold text-red-500">✕ बंद करें</button>
        <div class="space-y-6">
            <div><h2 class="text-xs font-bold text-gray-500 uppercase">ORGANIZE PDF</h2>
                <div class="mt-2 space-y-2">
                    <a href="#" onclick="processTool('merge')" class="block hover:text-red-500">Merge PDF</a>
                    <a href="#" onclick="processTool('split')" class="block hover:text-red-500">Split PDF</a>
                </div>
            </div>
            <div><h2 class="text-xs font-bold text-gray-500 uppercase">CONVERT</h2>
                <div class="mt-2 space-y-2">
                    <a href="#" onclick="processTool('jpg2pdf')" class="block hover:text-red-500">JPG to PDF</a>
                    <a href="#" onclick="processTool('pdf2jpg')" class="block hover:text-red-500">PDF to JPG</a>
                </div>
            </div>
        </div>
    </div>

    <main class="p-6 flex flex-col items-center mt-10">
        <div class="w-full max-w-md bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700">
            <h2 id="toolTitle" class="text-xl font-bold mb-4 text-center text-red-500">MERGE PDF</h2>
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center mb-4">
                <input type="file" id="fileInput" class="w-full" multiple>
            </div>
            <button onclick="uploadFile()" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded-xl font-bold transition">Process File 🚀</button>
            <p id="status" class="mt-4 text-sm text-center text-gray-400">फाइलें चुनें और प्रोसेस करें</p>
        </div>
    </main>

    <script>
        function toggleMenu(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        let activeTool = 'merge';
        function processTool(tool) {
            activeTool = tool;
            document.getElementById('toolTitle').innerText = tool.toUpperCase() + " PDF";
            toggleMenu('pdfMenu');
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if(fileInput.files.length === 0) return alert("कृपया फाइलें चुनें!");
            const status = document.getElementById('status');
            status.innerText = "प्रोसेसिंग चालू है... ⏳";
            
            const formData = new FormData();
            for(let i=0; i<fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }
            formData.append('tool', activeTool);

            try {
                const response = await fetch("https://pdf-shredder.onrender.com/api/v1/pdf/convert", {
                    method: "POST",
                    body: formData
                });
                if(!response.ok) throw new Error("सर्वर एरर");
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `result_${activeTool}_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                status.innerText = "सफलतापूर्वक डाउनलोड हो गया! 🎉";
            } catch (e) {
                status.innerText = "एरर: सर्वर रिस्पॉन्स नहीं दे रहा!";
            }
        }
    </script>
</body>
</html>
